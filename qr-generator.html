<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>簽到頁 QR Code 產生器</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f3f6f8;
      color: #17212b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC",
        "Microsoft JhengHei", sans-serif;
    }
    main {
      width: min(92vw, 560px);
      padding: 24px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 12px 36px rgba(31, 41, 55, .12);
    }
    h1 { margin-top: 0; }
    p { color: #637080; line-height: 1.6; }
    input {
      width: 100%;
      min-height: 48px;
      padding: 11px 13px;
      border: 1px solid #d8e0e6;
      border-radius: 12px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .actions { display: flex; gap: 10px; margin: 14px 0; flex-wrap: wrap; }
    button {
      border: 0;
      border-radius: 12px;
      min-height: 46px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 800;
      font-size: 15px;
    }
    .primary { background: #087f5b; color: white; }
    .secondary { background: #eaf3fb; color: #1769aa; }
    #qrcode {
      width: 340px;
      max-width: 100%;
      min-height: 20px;
      margin: 22px auto 10px;
      display: grid;
      place-items: center;
    }
    #qrcode img, #qrcode canvas { max-width: 100%; height: auto; }
    #message { color: #b42318; }
  </style>
</head>
<body>
  <main>
    <h1>簽到頁 QR Code 產生器</h1>
    <p>貼上 GitHub Pages 發布後的簽到頁網址，再下載 PNG 圖檔放入簡報或會議海報。</p>
    <input id="url" type="url" placeholder="https://你的帳號.github.io/meeting-checkin/">
    <div class="actions">
      <button class="primary" id="generate">產生 QR Code</button>
      <button class="secondary" id="download" disabled>下載 PNG</button>
    </div>
    <div id="message"></div>
    <div id="qrcode"></div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    const input = document.getElementById("url");
    const container = document.getElementById("qrcode");
    const message = document.getElementById("message");
    const downloadBtn = document.getElementById("download");

    document.getElementById("generate").addEventListener("click", () => {
      message.textContent = "";
      downloadBtn.disabled = true;
      container.innerHTML = "";

      const url = input.value.trim();
      if (!/^https:\/\/.+/i.test(url)) {
        message.textContent = "請輸入完整的 HTTPS 網址。";
        return;
      }

      if (typeof QRCode === "undefined") {
        message.textContent = "QR Code 程式庫載入失敗，請確認網路連線。";
        return;
      }

      new QRCode(container, {
        text: url,
        width: 320,
        height: 320,
        correctLevel: QRCode.CorrectLevel.H
      });

      setTimeout(() => { downloadBtn.disabled = false; }, 150);
    });

    downloadBtn.addEventListener("click", () => {
      const canvas = container.querySelector("canvas");
      const image = container.querySelector("img");
      const dataUrl = canvas ? canvas.toDataURL("image/png") : image?.src;

      if (!dataUrl) {
        message.textContent = "尚未產生 QR Code。";
        return;
      }

      const link = document.createElement("a");
      link.href = dataUrl;
      link.download = "會議簽到_QRCode.png";
      link.click();
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#087f5b">
  <title>會議簽到</title>
  <style>
    :root {
      --primary: #087f5b;
      --primary-dark: #066248;
      --secondary: #1769aa;
      --bg: #f3f6f8;
      --card: #ffffff;
      --text: #17212b;
      --muted: #637080;
      --border: #d8e0e6;
      --danger: #b42318;
      --success: #067647;
      --warning-bg: #fff8e1;
      --shadow: 0 12px 36px rgba(31, 41, 55, .10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC",
        "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(23, 105, 170, .10), transparent 32%),
        radial-gradient(circle at top left, rgba(8, 127, 91, .12), transparent 36%),
        var(--bg);
    }

    .page {
      width: min(100%, 620px);
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0 18px;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      color: white;
      font-size: 24px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 6vw, 34px);
      letter-spacing: .02em;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(216, 224, 230, .85);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .notice {
      margin-bottom: 18px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #eef7f3;
      color: #145c47;
      line-height: 1.55;
      font-size: 14px;
    }

    .field { margin: 0 0 17px; }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 700;
      font-size: 15px;
    }

    .required::after {
      content: " *";
      color: var(--danger);
    }

    input[type="text"] {
      width: 100%;
      min-height: 48px;
      padding: 11px 13px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: white;
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    input[type="text"]:focus {
      border-color: var(--secondary);
      box-shadow: 0 0 0 4px rgba(23, 105, 170, .12);
    }

    .hint {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .location-box {
      padding: 14px;
      border: 1px dashed #aebbc5;
      border-radius: 14px;
      background: #fbfcfd;
    }

    .location-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button, .button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      min-height: 46px;
      padding: 11px 16px;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      transition: transform .08s ease, opacity .15s ease, background .15s ease;
    }

    button:active { transform: translateY(1px); }
    button:disabled { cursor: not-allowed; opacity: .55; }

    .locate-btn {
      color: var(--secondary);
      background: #eaf3fb;
    }

    .submit-btn {
      width: 100%;
      margin-top: 8px;
      min-height: 52px;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      box-shadow: 0 8px 20px rgba(8, 127, 91, .20);
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.5;
    }

    .status.success { color: var(--success); }
    .status.error { color: var(--danger); }
    .status.muted { color: var(--muted); }

    .consent {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 17px 0 10px;
      line-height: 1.55;
      font-size: 14px;
    }

    .consent input {
      width: 19px;
      height: 19px;
      margin-top: 2px;
      accent-color: var(--primary);
      flex: 0 0 auto;
    }

    .privacy {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .message {
      display: none;
      margin: 0 0 18px;
      padding: 14px 16px;
      border-radius: 14px;
      line-height: 1.55;
    }

    .message.show { display: block; }
    .message.error { background: #fef3f2; color: var(--danger); }
    .message.success { background: #ecfdf3; color: var(--success); }
    .message.warning { background: var(--warning-bg); color: #7a4d00; }

    .receipt {
      display: none;
      text-align: center;
      padding: 10px 0 4px;
    }

    .receipt.show { display: block; }

    .receipt-icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 14px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #e9f8f1;
      color: var(--success);
      font-size: 38px;
      font-weight: 900;
    }

    .receipt h2 { margin: 0 0 8px; }
    .receipt p { color: var(--muted); line-height: 1.6; }

    .hidden-honeypot {
      position: absolute !important;
      left: -10000px !important;
      width: 1px !important;
      height: 1px !important;
      overflow: hidden !important;
    }

    .spinner {
      display: inline-block;
      width: 17px;
      height: 17px;
      margin-right: 8px;
      vertical-align: -3px;
      border: 2px solid rgba(255,255,255,.45);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 420px) {
      .page { padding: 18px 12px 36px; }
      .card { padding: 18px; border-radius: 18px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="brand">
      <div class="brand-mark" aria-hidden="true">✓</div>
      <div>
        <h1 id="eventName">會議簽到</h1>
        <p class="subtitle">請先開啟定位，再填寫資料完成簽到</p>
      </div>
    </header>

    <div id="topMessage" class="message" role="alert"></div>

    <section class="card">
      <form id="attendanceForm" novalidate>
        <div class="notice">
          系統將以伺服器時間記錄簽到時間，並記錄您授權提供的手機定位，以及由本網站產生的瀏覽器裝置識別碼（非 IMEI）。
        </div>

        <div class="field">
          <label class="required" for="department">課別</label>
          <input
            id="department"
            name="department"
            type="text"
            maxlength="20"
            autocomplete="organization"
            placeholder="例如：台北五課"
            required
          >
        </div>

        <div class="field">
          <label class="required" for="storeNo">店號</label>
          <input
            id="storeNo"
            name="storeNo"
            type="text"
            inputmode="numeric"
            autocomplete="off"
            maxlength="6"
            pattern="[0-9]{6}"
            placeholder="例如：005989"
            required
          >
          <p class="hint">請輸入 6 碼店號，前方的 0 不可省略。</p>
        </div>

        <div class="field">
          <label class="required" for="storeName">店舖名稱</label>
          <input
            id="storeName"
            name="storeName"
            type="text"
            maxlength="40"
            placeholder="例如：中賓店"
            required
          >
        </div>

        <div class="field">
          <label class="required" for="attendeeName">姓名</label>
          <input
            id="attendeeName"
            name="attendeeName"
            type="text"
            maxlength="30"
            placeholder="例如：陳小傑"
            required
          >
        </div>

        <div class="field">
          <label class="required">目前位置</label>
          <div class="location-box">
            <div class="location-row">
              <button id="locateBtn" class="locate-btn" type="button">取得目前位置</button>
              <span id="locationStatus" class="status muted">尚未取得定位</span>
            </div>
            <p id="locationDetail" class="hint"></p>
          </div>
        </div>

        <div class="hidden-honeypot" aria-hidden="true">
          <label for="website">請勿填寫</label>
          <input id="website" name="website" type="text" tabindex="-1" autocomplete="off">
        </div>

        <label class="consent">
          <input id="consent" type="checkbox" required>
          <span>我已閱讀下方資料蒐集告知，並同意提供本次簽到資料、裝置定位及瀏覽器裝置識別碼（非 IMEI）。</span>
        </label>

        <button id="submitBtn" class="submit-btn" type="submit">送出簽到</button>

        <div class="privacy" id="privacyNotice"></div>
      </form>

      <div id="receipt" class="receipt" aria-live="polite">
        <div class="receipt-icon">✓</div>
        <h2>簽到資料已送出</h2>
        <p id="receiptText"></p>
      </div>
    </section>
  </main>

  <script src="config.js"></script>
  <script>
    (() => {
      "use strict";

      const config = window.ATTENDANCE_CONFIG || {};
      const form = document.getElementById("attendanceForm");
      const eventName = document.getElementById("eventName");
      const department = document.getElementById("department");
      const storeNo = document.getElementById("storeNo");
      const storeName = document.getElementById("storeName");
      const attendeeName = document.getElementById("attendeeName");
      const locateBtn = document.getElementById("locateBtn");
      const locationStatus = document.getElementById("locationStatus");
      const locationDetail = document.getElementById("locationDetail");
      const consent = document.getElementById("consent");
      const submitBtn = document.getElementById("submitBtn");
      const topMessage = document.getElementById("topMessage");
      const privacyNotice = document.getElementById("privacyNotice");
      const receipt = document.getElementById("receipt");
      const receiptText = document.getElementById("receiptText");

      let positionData = null;
      let submitting = false;
      let pendingSubmission = null;
      const browserDeviceId = getOrCreateBrowserDeviceId();

      eventName.textContent = config.EVENT_NAME || "會議簽到";
      document.title = `${eventName.textContent}｜簽到`;
      privacyNotice.textContent =
        config.PRIVACY_NOTICE ||
        "本頁所蒐集資料僅供本次會議出席確認與統計使用。";

      storeNo.addEventListener("input", () => {
        storeNo.value = storeNo.value.replace(/\D/g, "").slice(0, 6);
      });

      locateBtn.addEventListener("click", requestLocation);
      form.addEventListener("submit", submitAttendance);
      window.addEventListener("message", handleBackendMessage);

      if (location.protocol !== "https:" && location.hostname !== "localhost") {
        showMessage(
          "定位功能需要 HTTPS 網址。請確認此頁已發布於 GitHub Pages 或其他 HTTPS 網站。",
          "warning"
        );
      }

      if (!config.APPS_SCRIPT_URL ||
          config.APPS_SCRIPT_URL.includes("請貼上_") ||
          !/\/exec(?:\?|$)/.test(config.APPS_SCRIPT_URL)) {
        showMessage(
          "尚未設定 Apps Script 部署網址，請先修改 config.js 的 APPS_SCRIPT_URL。",
          "warning"
        );
      }

      function requestLocation() {
        clearMessage();

        if (!navigator.geolocation) {
          setLocationError("此瀏覽器不支援定位功能，請改用手機 Chrome 或 Safari。");
          return;
        }

        locateBtn.disabled = true;
        locateBtn.textContent = "定位中…";
        locationStatus.className = "status muted";
        locationStatus.textContent = "正在取得 GPS 定位";
        locationDetail.textContent = "";

        navigator.geolocation.getCurrentPosition(
          (position) => {
            positionData = {
              latitude: round(position.coords.latitude, 7),
              longitude: round(position.coords.longitude, 7),
              accuracy: Math.round(position.coords.accuracy || 0)
            };

            locationStatus.className = "status success";
            locationStatus.textContent = "定位取得成功";
            locationDetail.innerHTML =
              `定位誤差約 ${positionData.accuracy} 公尺。` +
              ` <a href="https://www.google.com/maps?q=${positionData.latitude},${positionData.longitude}"` +
              ` target="_blank" rel="noopener">查看位置</a>`;
            locateBtn.textContent = "重新定位";
            locateBtn.disabled = false;
          },
          (error) => {
            const messages = {
              1: "您未允許定位權限。請在瀏覽器網站設定中開啟定位後重試。",
              2: "目前無法取得位置，請開啟手機定位服務並移至訊號較佳處。",
              3: "定位逾時，請再試一次。"
            };
            setLocationError(messages[error.code] || "定位失敗，請稍後重試。");
          },
          {
            enableHighAccuracy: true,
            timeout: Number(config.LOCATION_TIMEOUT_MS) || 20000,
            maximumAge: 0
          }
        );
      }

      function setLocationError(message) {
        positionData = null;
        locationStatus.className = "status error";
        locationStatus.textContent = message;
        locationDetail.textContent = "";
        locateBtn.textContent = "重新取得位置";
        locateBtn.disabled = false;
      }

      function submitAttendance(event) {
        event.preventDefault();
        clearMessage();

        if (submitting) return;

        const cleanDepartment = department.value.trim();
        const cleanStoreNo = storeNo.value.trim();
        const cleanStoreName = storeName.value.trim();
        const cleanAttendeeName = attendeeName.value.trim();

        if (!cleanDepartment) {
          showMessage("請填寫課別，例如：台北五課。", "error");
          department.focus();
          return;
        }

        if (!/^\d{6}$/.test(cleanStoreNo)) {
          showMessage("店號必須為 6 碼數字，例如 005989。", "error");
          storeNo.focus();
          return;
        }

        if (!cleanStoreName) {
          showMessage("請填寫店舖名稱。", "error");
          storeName.focus();
          return;
        }

        if (!cleanAttendeeName) {
          showMessage("請填寫姓名。", "error");
          attendeeName.focus();
          return;
        }

        if (config.REQUIRE_LOCATION !== false && !positionData) {
          showMessage("請先按「取得目前位置」，定位成功後才能送出。", "error");
          locateBtn.focus();
          return;
        }

        if (!consent.checked) {
          showMessage("請勾選同意資料蒐集告知後再送出。", "error");
          consent.focus();
          return;
        }

        if (!config.APPS_SCRIPT_URL ||
            config.APPS_SCRIPT_URL.includes("請貼上_") ||
            !/\/exec(?:\?|$)/.test(config.APPS_SCRIPT_URL)) {
          showMessage("系統尚未完成後端網址設定，請聯絡主辦單位。", "error");
          return;
        }

        const duplicateKey =
          `${config.EVENT_NAME}|${cleanDepartment}|${cleanStoreNo}|${cleanAttendeeName}`;
        const lastSubmit = readLastSubmit();

        if (lastSubmit &&
            lastSubmit.key === duplicateKey &&
            Date.now() - lastSubmit.time < 5 * 60 * 1000) {
          showMessage("相同資料剛剛已送出，請勿重複簽到。", "warning");
          return;
        }

        const submissionId = makeId();
        const payload = {
          submissionId,
          eventName: String(config.EVENT_NAME || "會議簽到"),
          department: cleanDepartment,
          storeNo: cleanStoreNo,
          storeName: cleanStoreName,
          attendeeName: cleanAttendeeName,
          latitude: positionData ? String(positionData.latitude) : "",
          longitude: positionData ? String(positionData.longitude) : "",
          accuracy: positionData ? String(positionData.accuracy) : "",
          clientTime: new Date().toISOString(),
          timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone || "",
          userAgent: navigator.userAgent || "",
          browserDeviceId,
          deviceIdType: "browser-local-v1",
          pageUrl: location.href,
          consent: "yes",
          website: document.getElementById("website").value
        };

        setSubmitting(true);

        try {
          postToBackend(payload, {
            duplicateKey,
            department: cleanDepartment,
            storeNo: cleanStoreNo,
            storeName: cleanStoreName,
            attendeeName: cleanAttendeeName
          });
        } catch (error) {
          console.error(error);
          showMessage(
            "資料送出失敗，請確認網路連線後再試一次；若持續失敗，請洽現場工作人員。",
            "error"
          );
          setSubmitting(false);
        }
      }

      function postToBackend(payload, receiptData) {
        const frameName = `attendanceFrame_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const frame = document.createElement("iframe");
        frame.name = frameName;
        frame.title = "簽到資料送出結果";
        frame.style.display = "none";

        const postForm = document.createElement("form");
        postForm.method = "POST";
        postForm.action = config.APPS_SCRIPT_URL;
        postForm.target = frameName;
        postForm.style.display = "none";

        Object.entries(payload).forEach(([key, value]) => {
          const input = document.createElement("input");
          input.type = "hidden";
          input.name = key;
          input.value = value == null ? "" : String(value);
          postForm.appendChild(input);
        });

        document.body.appendChild(frame);
        document.body.appendChild(postForm);

        const timeoutId = window.setTimeout(() => {
          if (!pendingSubmission || pendingSubmission.id !== payload.submissionId) return;
          cleanupPendingSubmission();
          setSubmitting(false);
          showMessage(
            "伺服器未在時間內回覆。請先詢問現場人員是否已收到紀錄，再決定是否重新送出。",
            "error"
          );
        }, 30000);

        pendingSubmission = {
          id: payload.submissionId,
          frame,
          postForm,
          timeoutId,
          receiptData
        };

        postForm.submit();
      }

      function handleBackendMessage(event) {
        const data = event.data;
        if (!data || data.source !== "meeting-attendance") return;
        if (!pendingSubmission || data.submissionId !== pendingSubmission.id) return;

        const pending = pendingSubmission;
        window.clearTimeout(pending.timeoutId);

        if (data.status === "ok") {
          localStorage.setItem(
            "meetingAttendanceLastSubmit",
            JSON.stringify({
              key: pending.receiptData.duplicateKey,
              time: Date.now(),
              submissionId: pending.id
            })
          );

          form.style.display = "none";
          receipt.classList.add("show");
          receiptText.textContent =
            `${pending.receiptData.department}／` +
            `${pending.receiptData.storeNo} ${pending.receiptData.storeName}／` +
            `${pending.receiptData.attendeeName}，` +
            `簽到時間：${data.serverTime || new Date().toLocaleString("zh-TW")}`;
          window.scrollTo({ top: 0, behavior: "smooth" });
          cleanupPendingSubmission();
          return;
        }

        const errorMessage = data.message || "後端未能儲存資料，請稍後重試。";
        cleanupPendingSubmission();
        setSubmitting(false);
        showMessage(errorMessage, "error");
      }

      function cleanupPendingSubmission() {
        if (!pendingSubmission) return;
        const { frame, postForm } = pendingSubmission;
        pendingSubmission = null;
        window.setTimeout(() => {
          frame?.remove();
          postForm?.remove();
        }, 500);
      }

      function setSubmitting(value) {
        submitting = value;
        submitBtn.disabled = value;
        submitBtn.innerHTML = value
          ? '<span class="spinner" aria-hidden="true"></span>資料送出中'
          : "送出簽到";
        locateBtn.disabled = value;
      }

      function showMessage(text, type) {
        topMessage.textContent = text;
        topMessage.className = `message show ${type || "error"}`;
        topMessage.scrollIntoView({ behavior: "smooth", block: "center" });
      }

      function clearMessage() {
        topMessage.textContent = "";
        topMessage.className = "message";
      }

      function readLastSubmit() {
        try {
          return JSON.parse(localStorage.getItem("meetingAttendanceLastSubmit") || "null");
        } catch {
          return null;
        }
      }

      function makeId() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }
        return `att-${Date.now()}-${Math.random().toString(36).slice(2, 12)}`;
      }

      function getOrCreateBrowserDeviceId() {
        const key = "meetingAttendanceBrowserDeviceId";
        try {
          let id = localStorage.getItem(key);
          if (!id) {
            id = `browser-${makeId()}`;
            localStorage.setItem(key, id);
          }
          return id;
        } catch (error) {
          console.warn("無法使用 localStorage，改用本次頁面識別碼。", error);
          return `session-${makeId()}`;
        }
      }

      function round(value, digits) {
        const factor = 10 ** digits;
        return Math.round(value * factor) / factor;
      }
    })();
  </script>
</body>
</html>
